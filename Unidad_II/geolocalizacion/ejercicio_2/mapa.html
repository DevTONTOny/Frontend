        const map = L.map('map').setView([51.505, -0.09], 13);
        const coords = [];
        function onMapClick(e) {
            coords.push(e.latlng);
        }
        map.on('click', onMapClick);
        function dibujar() {
            var polygon = L.polygon(coords
            ).addTo(map);
            for (let i = 0; i < coords.length; i++) {
                let markDraw = L.marker(coords[i]).addTo(map);
            }
            coords = [];
        }
        L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>'
        }).addTo(map);
        async function obtenerPersona() {
            const response = await fetch('https://randomuser.me/api/');
            const data = await response.json();
            const persona = data.results[0];
            console.log(persona);
            const nombre = persona.name.first + " " + persona.name.last;
            const genero = persona
            map.setView([persona.location.coordinates.latitude, persona.location.coordinates.longitude], 17);

            let marker = L.marker([persona.location.coordinates.latitude, persona.location.coordinates.longitude]).addTo(map);




            marker.bindPopup("<b>" + nombre + "</b>" + "<b><br>Latitud: " + persona.location.coordinates.latitude + "</b><br><b>longitud: " + persona.location.coordinates.longitude).openPopup();
        }
    </script>
